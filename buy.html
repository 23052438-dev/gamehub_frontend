<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Game Hub</title>
    <link rel="stylesheet" href="css/style.css">
     
</head>

<body class="auth-body">

    <div class="auth-card checkout-card">
    
        <h2>💳 Checkout</h2>
    
        <div class="checkout-details">
            <p>Total Amount: <strong id="checkoutTotal">₹0</strong></p>
        </div>
    
        <select id="paymentMethod" class="checkout-input">
            <option value="">Select Payment Method</option>
            <option>UPI</option>
            <option>Credit Card</option>
            <option>Debit Card</option>
            <option>Net Banking</option>
        </select>
    
        <button class="auth-btn" onclick="validatePayment()">
            Confirm Purchase
        </button>
    
    </div>
    
    <script src="js/script.js"></script>
</body>
</html>
