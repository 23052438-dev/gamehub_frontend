<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Games | Game Hub</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2 class="logo">Game Hub</h2>
        <a href="index.html">Home</a>
        <a href="games.html" class="active">Games</a>
        <a href="support.html">Support</a>
        <a href="offers.html">Offers</a>
        <a href="aboutus.html">About Us</a>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="content">

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">

            <h1 class="page-title">Discover Games 🎮</h1>
        
            <!-- SEARCH BAR -->
            <input 
                type="text" 
                id="searchInput"
                placeholder="Search games..."
                onkeyup="searchGames()"
                style="padding:8px 12px; border-radius:8px; border:none; width:220px;"
            >
        
        </div>
        
        <h1 class="page-title">Discover Games 🎮</h1>

        <!-- THIS IS THE IMPORTANT PART -->
        <div class="game-grid" id="gameGrid"></div>

    </main>

</div>

<script src="js/script.js"></script>

<!-- ================== CHATBOT ================== -->

<!-- Floating Icon -->
<div id="chatIcon" onclick="toggleChatbot()">
    💬
</div>

<!-- Chatbox -->
<div id="chatBox">

    <div id="chatHeader">
        🤖 GameBot
        <span onclick="toggleChatbot()">✖</span>
    </div>

    <div id="chatMessages"></div>

    <div id="chatInputArea">
        <input type="text" id="chatInput" placeholder="Ask for games...">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

</body>
</html>
